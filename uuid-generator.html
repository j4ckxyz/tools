<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UUID Generator — Browser Tools</title>
  <meta name="description" content="Generate single or batch UUID v4 identifiers. Customize casing, formatting, delimiters, and export options.">
  
  <!-- Open Graph -->
  <meta property="og:title" content="UUID Generator — Browser Tools">
  <meta property="og:description" content="Generate single or batch UUID v4 identifiers. Customize casing, formatting, delimiters, and export options.">
  <meta property="og:image" content="https://tools.j4ck.xyz/og-image.jpg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://tools.j4ck.xyz/og-image.jpg">

  <!-- Prevent Theme Flash -->
  <script>
    const savedTheme = localStorage.getItem('theme') || 'auto';
    if (savedTheme === 'dark') {
      document.documentElement.classList.add('theme-dark');
    } else if (savedTheme === 'light') {
      document.documentElement.classList.add('theme-light');
    }
  </script>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Common CSS -->
  <link rel="stylesheet" href="common.css">
  <style>
  * {
    box-sizing: border-box;
  }
  .uuid-textarea {
    font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace !important;
    font-size: 14px !important;
    height: 380px;
  }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header-custom">
    <div class="header-inner">
      <a href="index.html" class="header-brand">
        <i class="bi bi-arrow-left"></i> UUID Generator
      </a>
      <div class="d-flex gap-2 align-items-center">
        <button id="theme-toggle" class="btn-custom btn-custom-secondary py-1 px-2 fs-7" title="Switch Theme">
          <i id="theme-toggle-icon" class="bi bi-circle-half"></i>
        </button>
        <span class="text-muted-custom fs-7">tools.j4ck.xyz</span>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <main class="container-custom">
    <div class="mb-4">
      <h2>UUID Generator</h2>
      <p class="text-muted-custom">Generate RFC 4122 compliant version 4 UUIDs (universally unique identifiers) individually or in bulk.</p>
    </div>

    <div class="row g-4">
      <!-- Options Sidebar -->
      <div class="col-lg-5">
        <div class="card-custom h-100 mb-0">
          <h5 class="mb-3">Generator Settings</h5>
          
          <div class="mb-3">
            <label for="uuid-count">Quantity</label>
            <input type="number" id="uuid-count" min="1" max="1000" value="10" class="form-control">
            <span class="fs-8 text-muted-custom mt-1 d-block">Generate up to 1000 UUIDs at once.</span>
          </div>

          <div class="mb-3">
            <label for="uuid-format">Formatting Style</label>
            <select id="uuid-format" class="form-select">
              <option value="standard">Standard (8-4-4-4-12 with hyphens)</option>
              <option value="no-dashes">Compact (32 characters, no hyphens)</option>
              <option value="braces">Curly Braces {xxxxxxxx-xxxx-...}</option>
              <option value="urn">URN (urn:uuid:xxxxxxxx-xxxx-...)</option>
            </select>
          </div>

          <div class="mb-3">
            <label>Casing</label>
            <div class="d-flex gap-3">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="uuid-casing" id="casing-lower" value="lower" checked>
                <label class="form-check-label" for="casing-lower">lowercase</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="uuid-casing" id="casing-upper" value="upper">
                <label class="form-check-label" for="casing-upper">UPPERCASE</label>
              </div>
            </div>
          </div>

          <div class="mb-4">
            <label for="uuid-separator">Separator / Wrapping</label>
            <select id="uuid-separator" class="form-select">
              <option value="newline">New Line</option>
              <option value="comma">Comma separated</option>
              <option value="quotes-double">Double quotes & comma (Array)</option>
              <option value="quotes-single">Single quotes & comma</option>
            </select>
          </div>

          <button id="btn-generate" class="btn-custom btn-custom-primary w-100 py-3">
            <i class="bi bi-arrow-repeat"></i> Generate UUIDs
          </button>
        </div>
      </div>

      <!-- Output Pane -->
      <div class="col-lg-7">
        <div class="card-custom h-100 mb-0">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <label class="mb-0" for="uuid-output">Generated Output</label>
            <div class="d-flex gap-2">
              <button id="btn-copy" class="btn-custom btn-custom-secondary py-1 px-2 fs-8">
                <i class="bi bi-copy"></i> Copy
              </button>
              <button id="btn-download" class="btn-custom btn-custom-secondary py-1 px-2 fs-8">
                <i class="bi bi-download"></i> Download
              </button>
            </div>
          </div>
          <textarea id="uuid-output" class="uuid-textarea" readonly></textarea>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
  const uuidCount = document.getElementById('uuid-count');
  const uuidFormat = document.getElementById('uuid-format');
  const uuidSeparator = document.getElementById('uuid-separator');
  const btnGenerate = document.getElementById('btn-generate');
  const uuidOutput = document.getElementById('uuid-output');
  const btnCopy = document.getElementById('btn-copy');
  const btnDownload = document.getElementById('btn-download');

  // RFC4122 v4 UUID generator logic using crypto.getRandomValues
  function generateV4() {
    const rawBytes = new Uint8Array(16);
    window.crypto.getRandomValues(rawBytes);

    // Set version to 4 (0100)
    rawBytes[6] = (rawBytes[6] & 0x0f) | 0x40;
    // Set variant to RFC4122 (10xx)
    rawBytes[8] = (rawBytes[8] & 0x3f) | 0x80;

    const hex = Array.from(rawBytes).map(b => b.toString(16).padStart(2, '0')).join('');
    
    // xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx
    return [
      hex.substring(0, 8),
      hex.substring(8, 12),
      hex.substring(12, 16),
      hex.substring(16, 20),
      hex.substring(20, 32)
    ].join('-');
  }

  function formatUuid(uuid, style, isUpper) {
    let formatted = uuid;
    if (style === 'no-dashes') {
      formatted = uuid.replace(/-/g, '');
    } else if (style === 'braces') {
      formatted = `{${uuid}}`;
    } else if (style === 'urn') {
      formatted = `urn:uuid:${uuid}`;
    }

    return isUpper ? formatted.toUpperCase() : formatted.toLowerCase();
  }

  function assembleList(uuids, sep) {
    if (sep === 'comma') {
      return uuids.join(', ');
    } else if (sep === 'quotes-double') {
      return uuids.map(u => `"${u}"`).join(',\n');
    } else if (sep === 'quotes-single') {
      return uuids.map(u => `'${u}'`).join(',\n');
    }
    return uuids.join('\n');
  }

  function runGenerator() {
    let count = parseInt(uuidCount.value, 10);
    if (isNaN(count) || count < 1) {
      count = 1;
      uuidCount.value = 1;
    } else if (count > 1000) {
      count = 1000;
      uuidCount.value = 1000;
    }

    const style = uuidFormat.value;
    const isUpper = document.querySelector('input[name="uuid-casing"]:checked').value === 'upper';
    const sep = uuidSeparator.value;

    const uuids = [];
    for (let i = 0; i < count; i++) {
      uuids.push(formatUuid(generateV4(), style, isUpper));
    }

    uuidOutput.value = assembleList(uuids, sep);
  }

  // Event Listeners
  btnGenerate.addEventListener('click', runGenerator);

  btnCopy.addEventListener('click', async () => {
    const val = uuidOutput.value;
    if (!val) return;
    try {
      await navigator.clipboard.writeText(val);
      const originalText = btnCopy.innerHTML;
      btnCopy.innerHTML = '<i class="bi bi-check"></i> Copied!';
      setTimeout(() => {
        btnCopy.innerHTML = originalText;
      }, 2000);
    } catch (err) {
      alert('Failed to copy text: ' + err);
    }
  });

  btnDownload.addEventListener('click', () => {
    const val = uuidOutput.value;
    if (!val) return;
    const blob = new Blob([val], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'uuids.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  // Generate on load
  runGenerator();

  // Theme Toggle Script
  const themeToggleBtn = document.getElementById('theme-toggle');
  const themeToggleIcon = document.getElementById('theme-toggle-icon');

  function updateThemeUI(theme) {
    if (!themeToggleIcon) return;
    themeToggleIcon.className = 'bi';
    if (theme === 'dark') {
      themeToggleIcon.classList.add('bi-moon-fill');
      themeToggleBtn.title = 'Theme: Dark';
    } else if (theme === 'light') {
      themeToggleIcon.classList.add('bi-sun-fill');
      themeToggleBtn.title = 'Theme: Light';
    } else {
      themeToggleIcon.classList.add('bi-circle-half');
      themeToggleBtn.title = 'Theme: Auto (System)';
    }
  }

  function toggleTheme() {
    const currentTheme = localStorage.getItem('theme') || 'auto';
    let nextTheme = 'auto';
    if (currentTheme === 'auto') nextTheme = 'light';
    else if (currentTheme === 'light') nextTheme = 'dark';
    
    localStorage.setItem('theme', nextTheme);
    document.documentElement.classList.remove('theme-light', 'theme-dark');
    
    if (nextTheme === 'dark') {
      document.documentElement.classList.add('theme-dark');
    } else if (nextTheme === 'light') {
      document.documentElement.classList.add('theme-light');
    }
    
    updateThemeUI(nextTheme);
  }

  if (themeToggleBtn) {
    themeToggleBtn.addEventListener('click', toggleTheme);
    updateThemeUI(localStorage.getItem('theme') || 'auto');
  }
  </script>
</body>
</html>
