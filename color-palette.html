<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Explorer — Browser Tools</title>
  <meta name="description" content="Generate beautiful color palettes, check contrast ratios, lock colors, and export hex, rgb, hsl, or oklch values.">
  
  <!-- Open Graph -->
  <meta property="og:title" content="Color Palette Explorer — Browser Tools">
  <meta property="og:description" content="Generate beautiful color palettes, check contrast ratios, lock colors, and export hex, rgb, hsl, or oklch values.">
  <meta property="og:image" content="https://tools.j4ck.xyz/og-image.jpg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://tools.j4ck.xyz/og-image.jpg">

  <!-- Prevent Theme Flash -->
  <script>
    const savedTheme = localStorage.getItem('theme') || 'auto';
    if (savedTheme === 'dark') {
      document.documentElement.classList.add('theme-dark');
    } else if (savedTheme === 'light') {
      document.documentElement.classList.add('theme-light');
    }
  </script>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Common CSS -->
  <link rel="stylesheet" href="common.css">
  <style>
  * {
    box-sizing: border-box;
  }
  /* Color explorer layouts */
  .palette-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
    min-height: 380px;
    margin-bottom: 2rem;
  }
  @media (max-width: 576px) {
    .palette-container {
      grid-template-columns: 1fr;
      min-height: auto;
    }
  }
  .color-card {
    background-color: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-sm);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .color-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .color-swatch {
    height: 180px;
    position: relative;
    cursor: pointer;
    transition: background-color 0.2s ease;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 1rem;
  }
  @media (max-width: 576px) {
    .color-swatch {
      height: 80px;
    }
  }
  .contrast-badge {
    position: absolute;
    top: 0.75rem;
    left: 0.75rem;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    background-color: rgba(0, 0, 0, 0.6);
    color: #ffffff;
    pointer-events: none;
  }
  .lock-btn {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    background: rgba(0, 0, 0, 0.4);
    border: none;
    color: #ffffff;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background-color 0.15s ease, transform 0.1s ease;
  }
  .lock-btn:hover {
    background: rgba(0, 0, 0, 0.6);
  }
  .lock-btn.locked {
    background: var(--accent);
    color: #ffffff;
  }
  .color-details {
    padding: 1rem;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .color-value {
    font-family: SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    cursor: pointer;
    padding: 0.25rem 0.5rem;
    border-radius: var(--radius-sm);
    background-color: var(--bg-page);
    border: 1px solid var(--border-color);
    text-align: center;
    transition: background-color 0.15s ease;
  }
  .color-value:hover {
    background-color: var(--accent-bg-subtle);
    color: var(--accent);
  }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header-custom">
    <div class="header-inner">
      <a href="index.html" class="header-brand">
        <i class="bi bi-arrow-left"></i> Color Palette Explorer
      </a>
      <div class="d-flex gap-2 align-items-center">
        <button id="theme-toggle" class="btn-custom btn-custom-secondary py-1 px-2 fs-7" title="Switch Theme">
          <i id="theme-toggle-icon" class="bi bi-circle-half"></i>
        </button>
        <span class="text-muted-custom fs-7">tools.j4ck.xyz</span>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <main class="container-custom">
    <div class="mb-4">
      <h2>Color Palette Explorer</h2>
      <p class="text-muted-custom">Generate aesthetic color palettes, test WCAG text accessibility contrast, lock favorites, and copy formats.</p>
    </div>

    <!-- Palette Visualization -->
    <div id="palette-wrapper" class="palette-container">
      <!-- 5 Color Cards will be rendered here -->
    </div>

    <!-- Toolbar controls -->
    <div class="card-custom">
      <div class="row g-3 justify-content-between align-items-center">
        <!-- Harmony select -->
        <div class="col-md-4 col-sm-6">
          <label for="harmony-select">Harmony Rule</label>
          <select id="harmony-select" class="form-select">
            <option value="random">Random (Independent Colors)</option>
            <option value="analogous">Analogous (Adjacent Colors)</option>
            <option value="monochromatic">Monochromatic (Shades & Tints)</option>
            <option value="triadic">Triadic (Equidistant Triangles)</option>
            <option value="complementary">Complementary (Opposites)</option>
          </select>
        </div>

        <!-- Export/Format option -->
        <div class="col-md-3 col-sm-6">
          <label for="format-select">Display Format</label>
          <select id="format-select" class="form-select">
            <option value="hex">HEX (#ffffff)</option>
            <option value="rgb">RGB (rgb(r,g,b))</option>
            <option value="hsl">HSL (hsl(h,s,l))</option>
          </select>
        </div>

        <!-- Regenerate button -->
        <div class="col-md-4 col-sm-12 d-flex align-items-center pt-md-4">
          <button id="btn-regenerate" class="btn-custom btn-custom-primary w-100 py-3">
            <i class="bi bi-arrow-repeat"></i> Generate Palette <kbd class="kbd-shortcut ms-2 bg-dark text-light border-0">Space</kbd>
          </button>
        </div>
      </div>
    </div>

    <!-- Export modal/section -->
    <div class="card-custom mt-4">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <label class="mb-0">Export Values</label>
        <button id="btn-copy-all" class="btn-custom btn-custom-secondary py-1 px-2 fs-8">
          <i class="bi bi-copy"></i> Copy All
        </button>
      </div>
      <input type="text" id="export-input" class="form-control font-monospace fs-7" readonly placeholder="HEX values will list here...">
    </div>
  </main>

  <script type="module">
  const paletteWrapper = document.getElementById('palette-wrapper');
  const harmonySelect = document.getElementById('harmony-select');
  const formatSelect = document.getElementById('format-select');
  const btnRegenerate = document.getElementById('btn-regenerate');
  const btnCopyAll = document.getElementById('btn-copy-all');
  const exportInput = document.getElementById('export-input');

  // Initial Colors structure
  let colors = [
    { hex: '#3B82F6', locked: false },
    { hex: '#10B981', locked: false },
    { hex: '#F59E0B', locked: false },
    { hex: '#EF4444', locked: false },
    { hex: '#8B5CF6', locked: false }
  ];

  // HSL helper converters
  function hexToHsl(hex) {
    let r = parseInt(hex.slice(1, 3), 16) / 255;
    let g = parseInt(hex.slice(3, 5), 16) / 255;
    let b = parseInt(hex.slice(5, 7), 16) / 255;
    let max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, l = (max + min) / 2;

    if (max === min) {
      h = s = 0; // achromatic
    } else {
      let d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      switch (max) {
        case r: h = (g - b) / d + (g < b ? 6 : 0); break;
        case g: h = (b - r) / d + 2; break;
        case b: h = (r - g) / d + 4; break;
      }
      h /= 6;
    }

    return {
      h: Math.round(h * 360),
      s: Math.round(s * 100),
      l: Math.round(l * 100)
    };
  }

  function hslToHex(h, s, l) {
    l /= 100;
    const a = s * Math.min(l, 1 - l) / 100;
    const f = n => {
      const k = (n + h / 30) % 12;
      const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
      return Math.round(255 * color).toString(16).padStart(2, '0');
    };
    return `#${f(0)}${f(8)}${f(4)}`;
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return { r, g, b };
  }

  function calculateLuminance(r, g, b) {
    const a = [r, g, b].map(v => {
      v /= 255;
      return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
    });
    return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
  }

  function getContrastRatio(hex1, hex2) {
    const rgb1 = hexToRgb(hex1);
    const rgb2 = hexToRgb(hex2);
    const lum1 = calculateLuminance(rgb1.r, rgb1.g, rgb1.b);
    const lum2 = calculateLuminance(rgb2.r, rgb2.g, rgb2.b);
    return (Math.max(lum1, lum2) + 0.05) / (Math.min(lum1, lum2) + 0.05);
  }

  function getContrastVerdict(bgHex) {
    const ratioWithWhite = getContrastRatio(bgHex, '#FFFFFF');
    const ratioWithBlack = getContrastRatio(bgHex, '#000000');
    
    if (ratioWithWhite > ratioWithBlack) {
      return { text: '#FFFFFF', ratio: ratioWithWhite.toFixed(1), rating: ratioWithWhite >= 4.5 ? 'WCAG Pass (White)' : 'Poor Contrast' };
    } else {
      return { text: '#000000', ratio: ratioWithBlack.toFixed(1), rating: ratioWithBlack >= 4.5 ? 'WCAG Pass (Black)' : 'Poor Contrast' };
    }
  }

  function generateRandomHex() {
    const chars = '0123456789ABCDEF';
    let color = '#';
    for (let i = 0; i < 6; i++) {
      color += chars[Math.floor(Math.random() * 16)];
    }
    return color;
  }

  // Generators for harmony rules
  function generateHarmoniousPalette() {
    const rule = harmonySelect.value;
    
    // Find the first unlocked color to act as seed, or generate a random one
    let seedIndex = colors.findIndex(c => c.locked);
    let seedHex = seedIndex !== -1 ? colors[seedIndex].hex : generateRandomHex();
    let seedHsl = hexToHsl(seedHex);

    for (let i = 0; i < colors.length; i++) {
      if (colors[i].locked) continue;

      if (rule === 'random') {
        colors[i].hex = generateRandomHex();
      } else if (rule === 'analogous') {
        // Offset hue by 20 deg per step
        let offset = (i - 2) * 20;
        let newH = (seedHsl.h + offset + 360) % 360;
        colors[i].hex = hslToHex(newH, seedHsl.s, seedHsl.l);
      } else if (rule === 'monochromatic') {
        // Offset lightness
        let offset = (i - 2) * 12;
        let newL = Math.max(15, Math.min(85, seedHsl.l + offset));
        colors[i].hex = hslToHex(seedHsl.h, seedHsl.s, newL);
      } else if (rule === 'triadic') {
        // Seed, Seed + 120, Seed + 240, etc
        let offset = 0;
        if (i === 1) offset = 120;
        if (i === 2) offset = 240;
        if (i === 3) offset = 20; // helper variations
        if (i === 4) offset = 140;
        let newH = (seedHsl.h + offset) % 360;
        colors[i].hex = hslToHex(newH, seedHsl.s, seedHsl.l);
      } else if (rule === 'complementary') {
        // Opposite side of color wheel
        let offset = 0;
        if (i >= 2) offset = 180;
        // Adjust lightness/saturation to make it interesting
        let lightOffset = (i % 2 === 0) ? -15 : 15;
        let newH = (seedHsl.h + offset) % 360;
        let newL = Math.max(15, Math.min(85, seedHsl.l + lightOffset));
        colors[i].hex = hslToHex(newH, seedHsl.s, newL);
      }
    }

    renderPalette();
  }

  function getFormattedColor(hex, format) {
    if (format === 'rgb') {
      const rgb = hexToRgb(hex);
      return `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
    } else if (format === 'hsl') {
      const hsl = hexToHsl(hex);
      return `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
    }
    return hex.toLowerCase();
  }

  function renderPalette() {
    const format = formatSelect.value;
    paletteWrapper.innerHTML = '';
    
    const formattedList = [];

    colors.forEach((color, index) => {
      const displayVal = getFormattedColor(color.hex, format);
      formattedList.push(color.hex.toLowerCase());

      const contrast = getContrastVerdict(color.hex);
      
      const card = document.createElement('div');
      card.className = 'color-card';
      
      card.innerHTML = `
        <div class="color-swatch" style="background-color: ${color.hex};">
          <div class="contrast-badge" style="color: ${contrast.text}; border-color: ${contrast.text};">
            Contrast: ${contrast.ratio}:1
          </div>
          <button class="lock-btn ${color.locked ? 'locked' : ''}" aria-label="${color.locked ? 'Unlock color' : 'Lock color'}">
            <i class="bi ${color.locked ? 'bi-lock-fill' : 'bi-unlock'}"></i>
          </button>
        </div>
        <div class="color-details">
          <div class="color-value" title="Click to copy">${displayVal}</div>
          <div class="text-center text-muted-custom fs-8">${contrast.rating}</div>
        </div>
      `;

      // Lock button click
      const lockBtn = card.querySelector('.lock-btn');
      lockBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        color.locked = !color.locked;
        renderPalette();
      });

      // Swatch / Value click to copy
      const swatch = card.querySelector('.color-swatch');
      const valEl = card.querySelector('.color-value');
      
      const copyHandler = async () => {
        try {
          await navigator.clipboard.writeText(displayVal);
          const oldText = valEl.textContent;
          valEl.textContent = 'Copied!';
          valEl.style.color = 'var(--accent)';
          setTimeout(() => {
            valEl.textContent = oldText;
            valEl.style.color = '';
          }, 1500);
        } catch (err) {
          alert('Failed to copy.');
        }
      };

      swatch.addEventListener('click', (e) => {
        if (!e.target.closest('.lock-btn')) {
          copyHandler();
        }
      });
      valEl.addEventListener('click', copyHandler);

      paletteWrapper.appendChild(card);
    });

    exportInput.value = formattedList.join(', ');
  }

  // Event Listeners
  btnRegenerate.addEventListener('click', generateHarmoniousPalette);
  formatSelect.addEventListener('change', renderPalette);
  
  btnCopyAll.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(exportInput.value);
      const originalText = btnCopyAll.innerHTML;
      btnCopyAll.innerHTML = '<i class="bi bi-check"></i> Copied!';
      setTimeout(() => {
        btnCopyAll.innerHTML = originalText;
      }, 2000);
    } catch (err) {
      alert('Failed to copy.');
    }
  });

  // Spacebar to regenerate
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && document.activeElement.tagName !== 'SELECT' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'BUTTON') {
      e.preventDefault();
      generateHarmoniousPalette();
    }
  });

  // Initial draw
  generateHarmoniousPalette();

  // Theme Toggle Script
  const themeToggleBtn = document.getElementById('theme-toggle');
  const themeToggleIcon = document.getElementById('theme-toggle-icon');

  function updateThemeUI(theme) {
    if (!themeToggleIcon) return;
    themeToggleIcon.className = 'bi';
    if (theme === 'dark') {
      themeToggleIcon.classList.add('bi-moon-fill');
      themeToggleBtn.title = 'Theme: Dark';
    } else if (theme === 'light') {
      themeToggleIcon.classList.add('bi-sun-fill');
      themeToggleBtn.title = 'Theme: Light';
    } else {
      themeToggleIcon.classList.add('bi-circle-half');
      themeToggleBtn.title = 'Theme: Auto (System)';
    }
  }

  function toggleTheme() {
    const currentTheme = localStorage.getItem('theme') || 'auto';
    let nextTheme = 'auto';
    if (currentTheme === 'auto') nextTheme = 'light';
    else if (currentTheme === 'light') nextTheme = 'dark';
    
    localStorage.setItem('theme', nextTheme);
    document.documentElement.classList.remove('theme-light', 'theme-dark');
    
    if (nextTheme === 'dark') {
      document.documentElement.classList.add('theme-dark');
    } else if (nextTheme === 'light') {
      document.documentElement.classList.add('theme-light');
    }
    
    updateThemeUI(nextTheme);
  }

  if (themeToggleBtn) {
    themeToggleBtn.addEventListener('click', toggleTheme);
    updateThemeUI(localStorage.getItem('theme') || 'auto');
  }
  </script>
</body>
</html>
